data:
  dataset_dir: data/dataset
  train_ratio: 0.70
  val_ratio: 0.15

augment:
  degrees: 15
  hsv_v: 0.5
  hsv_s: 0.5
  fliplr: 0.5
  flipud: 0.3
  perspective: 0.0003
  shear: 10.0
  scale: 0.6
  erasing: 0.4

train:
  model_variant: x       # n=nano(fast), s=small, m=medium, l=large, x=xlarge
  epochs: 100
  imgsz: 1280
  batch: 8
  patience: 50
  cos_lr: true
  multi_scale: true
  close_mosaic: 20

inference:
  confidence: 0.30
  iou_threshold: 0.35
  use_slicing: true      # SAHI: slice large images for small/dense defects
  slice_size: 640
  overlap_ratio: 0.20
