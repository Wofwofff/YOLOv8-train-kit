data:
  dataset_dir: data/dataset
  train_ratio: 0.70
  val_ratio: 0.15

augment:
  rotate_limit: 15
  brightness_limit: 0.5
  saturation_limit: 0.5
  flip_lr: 0.5
  flip_ud: 0.3
  perspective: 0.0003
  shear: 10.0
  scale: 0.6
  erasing: 0.4

train:
  model_variant: x       # n=nano(fast), s=small, m=medium, l=large, x=xlarge
  epochs: 100
  image_size: 1280
  batch_size: 8
  patience: 50
  cos_lr: true
  label_smoothing: 0.1
  multi_scale: true
  close_mosaic: 20

inference:
  confidence: 0.30
  iou_threshold: 0.35
  use_slicing: true      # SAHI: slice large images for small/dense defects
  slice_size: 640
  overlap_ratio: 0.20
